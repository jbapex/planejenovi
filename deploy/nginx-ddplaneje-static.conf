# DD Planeje — app React/Vite (estático) + proxy Supabase (Kong) no mesmo host.
# Copiar para /etc/nginx/sites-available/ddplaneje.jbapex.com.br e:
#   nginx -t && systemctl restart nginx
#
# Requer: build + cópia para www (www-data não lê /root):
#   npm run build -w planeje-vite
#   sudo rsync -a --delete apps/planeje-vite/dist/ /var/www/ddplaneje-vite/
#   sudo chown -R www-data:www-data /var/www/ddplaneje-vite

server {
    listen 80;
    listen [::]:80;
    server_name ddplaneje.jbapex.com.br;

    include /etc/nginx/snippets/jbapex-supabase-proxy.conf;

    root /var/www/ddplaneje-vite;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
}
